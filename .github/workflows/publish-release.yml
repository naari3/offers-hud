name: Publish Release

on:
  release:
    types: [published]
jobs:
  get-properties:
    runs-on: ubuntu-latest
    outputs:
      release-type: ${{ steps.type.outputs.release-type }}
      mod-version: ${{ steps.properties.outputs.mod_version }}
      minecraft-version: ${{ steps.properties.outputs.minecraft_version }}
      curse-versions: ${{ steps.properties.outputs.release-curse-versions }}
      versions: ${{ steps.versions.outputs.versions }}
    steps:
      - name: Checkout the sources
        uses: actions/checkout@v7
      - name: Determine release type
        id: type
        run: |
          if ${{ github.event.release.prerelease }}; then
            echo "release-type=beta" >> $GITHUB_OUTPUT
          else
            echo "release-type=release" >> $GITHUB_OUTPUT
          fi
      - name: Read relevant fields from gradle.properties
        id: properties
        run:
          | # From christian-draeger/read-properties, using the action makes it extremely messy until christian-draeger/read-properties#2
          path='./gradle.properties'
          for property in mod_version minecraft_version release-curse-versions
          do
            result=$(sed -n "/^[[:space:]]*$property[[:space:]]*=[[:space:]]*/s/^[[:space:]]*$property[[:space:]]*=[[:space:]]*//p" "$path")
            echo "$property: $result"
            echo "$property=$result" >> $GITHUB_OUTPUT
          done
      - name: Get versions list
        id: versions
        run: |
          versions=$(ls -1 versions/ | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "versions=$versions" >> $GITHUB_OUTPUT

  build:
    runs-on: ubuntu-latest
    needs: [get-properties]
    strategy:
      fail-fast: false
      matrix:
        version: ${{ fromJSON(needs.get-properties.outputs.versions) }}
    steps:
      - name: Checkout the sources
        uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 25
      - name: Cache Gradle wrapper and dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/wrapper
            ~/.gradle/caches
          key: ${{ runner.os }}-gradle-deps-${{ hashFiles('**/*.gradle', '**/*.gradle.kts') }}
          restore-keys: ${{ runner.os }}-gradle-deps-
      - name: Cache loom
        uses: actions/cache@v5
        with:
          path: .gradle/loom-cache
          key: ${{ runner.os }}-loom-${{ matrix.version }}-${{ hashFiles(format('versions/{0}/gradle.properties', matrix.version)) }}
          restore-keys: ${{ runner.os }}-loom-${{ matrix.version }}-
      - name: Build with Gradle
        run: ./gradlew :${{ matrix.version }}:build --configure-on-demand
      - uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.version }}
          path: versions/${{ matrix.version }}/build/libs

  release:
    runs-on: ubuntu-latest
    needs: [build, get-properties]
    outputs:
      targets: ${{ steps.findjar.outputs.targets }}
    steps:
      - name: Checkout the sources
        uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: build-*
          path: artifacts
      - name: Find correct JARs
        id: findjar
        run: |
          jar_files=$(find artifacts -type f -name "offers-hud-*+*.jar" | grep -v "sources")
          echo "jar_files<<EOF" >> $GITHUB_OUTPUT
          echo "$jar_files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "$jar_files"
          targets=$(echo -n $jar_files | jq -R -s -c 'split(" ")')
          echo targets=$targets >> $GITHUB_OUTPUT
          echo "$targets"
      - name: Upload to the Github release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: ${{ steps.findjar.outputs.jar_files }}
      - uses: actions/upload-artifact@v7
        with:
          name: Compiled artifacts for ${{ github.sha }}
          path: artifacts

  publish-to-mod-repos:
    runs-on: ubuntu-latest
    needs: [release, get-properties]
    strategy:
      fail-fast: true
      matrix:
        file: ${{ fromJSON(needs.release.outputs.targets) }}
    steps:
      - name: Checkout the sources
        uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          name: Compiled artifacts for ${{ github.sha }}
          path: artifacts
      - name: Get Minecraft Version and Loader from filename
        id: getmcversion
        run: |
          # Extract "1.21.11-fabric" or "1.21.11-neoforge" from filename
          full_version=$(echo ${{ matrix.file }} | sed -n 's/.*\/offers-hud-.*+\(.*\)\.jar/\1/p')
          # Extract loader name (fabric or neoforge)
          loader=$(echo $full_version | sed -n 's/.*-\(fabric\|neoforge\)$/\1/p')
          # Extract Minecraft version (remove loader suffix)
          version=$(echo $full_version | sed 's/-\(fabric\|neoforge\)$//')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "loader=$loader" >> $GITHUB_OUTPUT
          echo "Detected: MC $version, Loader: $loader"

          # Read minecraft_deps and java_version from version-specific gradle.properties
          props_file="versions/${full_version}/gradle.properties"
          minecraft_deps=$(grep "^minecraft_deps=" "$props_file" | cut -d'=' -f2-)
          echo "game-versions=$minecraft_deps" >> $GITHUB_OUTPUT
          echo "Game versions: $minecraft_deps"

          java_version=$(grep "^java_version=" "$props_file" | cut -d'=' -f2- || echo "21")
          echo "java-version=${java_version:-21}" >> $GITHUB_OUTPUT
          echo "Java version: ${java_version:-21}"
      - name: Publish to Curseforge and Modrinth
        uses: Kira-NT/mc-publish@v3
        with:
          name: OffersHUD v${{ needs.get-properties.outputs.mod-version }} for Minecraft ${{ steps.getmcversion.outputs.version }} (${{ steps.getmcversion.outputs.loader }})
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-token: ${{ secrets.CF_API_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          changelog: ${{ github.event.release.body }}
          version-type: ${{ needs.get-properties.outputs.release-type }}
          game-versions: |
            ${{ steps.getmcversion.outputs.game-versions }}
          loaders: |
            ${{ steps.getmcversion.outputs.loader }}
          java: |
            ${{ steps.getmcversion.outputs.java-version }}
          files: ${{ matrix.file }}
